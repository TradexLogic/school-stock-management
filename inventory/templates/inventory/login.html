<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — স্কুল স্টক ম্যানেজমেন্ট</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .login-icon { font-size: 3rem; text-align: center; display: block; }
        .login-title { font-size: 1.5rem; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 4px; }
        .login-sub { color: #64748b; font-size: 0.875rem; text-align: center; margin-bottom: 28px; }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            padding: 10px 14px 10px 36px;
            font-size: 0.9rem;
        }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .form-label { font-weight: 500; color: #374151; font-size: 0.875rem; }
        .btn-login {
            background: #2563eb; color: #fff; border: none;
            padding: 12px; border-radius: 8px;
            font-weight: 600; font-size: 0.95rem;
            width: 100%; transition: background 0.2s;
        }
        .btn-login:hover { background: #1d4ed8; }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="login-icon">📚</span>
        <h1 class="login-title mt-2">Head Office Inventory</h1>
        <p class="login-sub">Stock Management</p>

        {% if form.non_field_errors %}
            <div class="alert alert-danger py-2 px-3 mb-3" style="font-size:0.85rem;border-radius:8px;">
                <i class="bi bi-exclamation-triangle me-1"></i>
                Invalid username or password.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-wrap">
                    <i class="bi bi-person"></i>
                    <input type="text" name="username" class="form-control"
                        placeholder="Enter username"
                        value="{{ form.username.value|default:'' }}"
                        autofocus required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="password" class="form-control"
                        placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i> Login
            </button>
        </form>

        <div class="text-center mt-4" style="color:#94a3b8;font-size:0.78rem;">
            <i class="bi bi-shield-lock me-1"></i>
            Authorized Personnel Only
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
